<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village Preservation Framework - Unified Coverage Dashboard</title>
    <style>
        :root {
            --bg: #0b1220;
            --bg-soft: #111a2b;
            --panel: #152238;
            --panel-alt: #1a2b45;
            --text: #e5edf8;
            --muted: #98a8c2;
            --border: #2b3f60;
            --accent: #5cc8ff;
            --accent-2: #7ef5b8;
            --warn: #ffd27a;
            --danger: #ff8f96;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 15%, #19325a 0%, rgba(25, 50, 90, 0) 35%),
                radial-gradient(circle at 85% 10%, #12403f 0%, rgba(18, 64, 63, 0) 35%),
                linear-gradient(160deg, var(--bg) 0%, #09101d 100%);
            padding: 2rem 1rem 3rem;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 1.75rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: clamp(1.8rem, 2.8vw, 2.4rem);
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            margin-top: 0.4rem;
            color: var(--muted);
            font-size: 1rem;
        }

        .section {
            background: linear-gradient(165deg, rgba(21, 34, 56, 0.95), rgba(14, 25, 42, 0.95));
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: 1.25rem;
            margin-top: 1rem;
        }

        .section h2 {
            font-size: 1.15rem;
            margin-bottom: 0.9rem;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 0.75rem;
        }

        .metric-card {
            background: linear-gradient(160deg, var(--panel), var(--panel-alt));
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.9rem;
        }

        .metric-label {
            color: var(--muted);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .metric-value {
            margin-top: 0.4rem;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .metric-sub {
            margin-top: 0.15rem;
            color: var(--muted);
            font-size: 0.82rem;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.65rem;
            margin-bottom: 0.9rem;
        }

        .toolbar input,
        .toolbar select {
            background: #0d1628;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: 0.5rem 0.65rem;
            font-size: 0.9rem;
        }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 740px;
            background: rgba(12, 20, 35, 0.7);
        }

        th,
        td {
            padding: 0.72rem 0.75rem;
            border-bottom: 1px solid rgba(43, 63, 96, 0.7);
            text-align: left;
            font-size: 0.92rem;
        }

        th {
            color: #c9d7ed;
            background: rgba(20, 33, 54, 0.9);
            cursor: pointer;
            user-select: none;
            position: sticky;
            top: 0;
        }

        th:hover {
            color: var(--accent);
        }

        tr:hover td {
            background: rgba(23, 40, 67, 0.55);
        }

        .score-pill,
        .coverage-pill {
            display: inline-block;
            border-radius: 999px;
            padding: 0.2rem 0.55rem;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .score-pill {
            color: #fef3c7;
            background: rgba(217, 119, 6, 0.25);
            border: 1px solid rgba(217, 119, 6, 0.5);
        }

        .coverage-pill {
            color: #d1fae5;
            background: rgba(5, 150, 105, 0.25);
            border: 1px solid rgba(5, 150, 105, 0.5);
        }

        .recommendation-list,
        .alerts-list {
            list-style: none;
            display: grid;
            gap: 0.6rem;
        }

        .recommendation-item,
        .alert-item {
            padding: 0.75rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(14, 24, 40, 0.9);
        }

        .alert-item {
            border-left: 4px solid var(--warn);
            background: linear-gradient(160deg, rgba(43, 33, 18, 0.65), rgba(26, 30, 44, 0.9));
        }

        .alert-title {
            color: #ffe7b0;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .muted {
            color: var(--muted);
            font-size: 0.85rem;
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--muted);
            font-size: 0.85rem;
        }

        @media (max-width: 720px) {
            body {
                padding: 1rem 0.65rem 2rem;
            }

            .section {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Village Preservation Framework</h1>
            <div class="subtitle">Unified Coverage Dashboard</div>
        </header>

        <section class="section">
            <h2>Main Metrics</h2>
            <div class="metrics-grid" id="metricsGrid"></div>
        </section>

        <section class="section">
            <h2>Project Table</h2>
            <div class="toolbar">
                <input id="projectSearch" type="text" placeholder="Search project names..." />
                <select id="projectTypeFilter">
                    <option value="all">All Types</option>
                </select>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th data-sort-key="name">Name</th>
                            <th data-sort-key="type">Type</th>
                            <th data-sort-key="coverage">Coverage</th>
                            <th data-sort-key="ageDays">Age</th>
                            <th data-sort-key="priorityScore">Priority Score</th>
                        </tr>
                    </thead>
                    <tbody id="projectTableBody"></tbody>
                </table>
            </div>
            <div class="muted" id="projectCount" style="margin-top: 0.75rem;"></div>
        </section>

        <section class="section">
            <h2>Coverage Recommendations</h2>
            <ul class="recommendation-list" id="recommendationList"></ul>
        </section>

        <section class="section">
            <h2>Project Discovery Alerts</h2>
            <ul class="alerts-list" id="alertsList"></ul>
        </section>

        <div class="footer">
            Last updated: <span id="timestamp">Loading...</span> • Source: <code>dashboard_data.json</code>
        </div>
    </div>

    <script>
        const state = {
            rows: [],
            sortKey: 'priorityScore',
            sortDir: 'desc',
            searchText: '',
            typeFilter: 'all'
        };

        function classifyProjectType(projectId, projectName) {
            const text = `${projectId || ''} ${projectName || ''}`.toLowerCase();
            if (text.includes('dashboard')) return 'Dashboard';
            if (text.includes('story')) return 'Story';
            if (text.includes('quiz')) return 'Interactive Quiz';
            if (text.includes('tarot')) return 'Interactive Tarot';
            if (text.includes('adventure')) return 'Interactive Adventure';
            if (text.includes('haiku')) return 'Generative Poetry';
            if (text.includes('arcade')) return 'Meta Portal';
            if (text.includes('experiment')) return 'Research';
            if (text.includes('essay')) return 'Essay';
            if (text.includes('garden')) return 'Knowledge Garden';
            if (text.includes('constellation')) return 'Experience';
            return 'Village Project';
        }

        function toCoverage(rec) {
            const covered = Number(rec.covered_participants_count || 0);
            const expected = Number(rec.expected_participants_count || 0);
            if (!expected) return 0;
            return (covered / expected) * 100;
        }

        function formatAge(days) {
            return `${days} day${days === 1 ? '' : 's'}`;
        }

        function renderMetrics(data) {
            const wide = data.village_wide_coverage || {};
            const presence = wide.presence_coverage || {};
            const completion = wide.completion_coverage || {};
            const hasDualCoverage = Object.keys(presence).length || Object.keys(completion).length;

            const presencePct = Number(
                hasDualCoverage ? presence.coverage_percentage : wide.coverage_percentage
            ) || 0;
            const presenceCovered = Number(
                hasDualCoverage ? presence.covered_projects : wide.covered_projects
            ) || 0;
            const presenceTotal = Number(
                hasDualCoverage ? presence.total_projects : wide.total_projects
            ) || 0;

            const completionPct = Number(
                hasDualCoverage ? completion.coverage_percentage : wide.coverage_percentage
            ) || 0;
            const completionCovered = Number(
                hasDualCoverage ? completion.covered_projects : wide.covered_projects
            ) || 0;
            const completionTotal = Number(
                hasDualCoverage ? completion.total_projects : wide.total_projects
            ) || 0;

            const metrics = [
                {
                    label: 'Total Coverage',
                    value: `${Number(data.total_coverage || 0).toFixed(1)}%`,
                    sub: 'Across tracked participants'
                },
                {
                    label: 'Presence Coverage',
                    value: `${presencePct.toFixed(1)}%`,
                    sub: `${presenceCovered}/${presenceTotal} projects`
                },
                {
                    label: 'Completion Coverage',
                    value: `${completionPct.toFixed(1)}%`,
                    sub: `${completionCovered}/${completionTotal} projects`
                },
                {
                    label: 'Active Registry Projects',
                    value: `${wide.active_projects_in_registry || 0}`,
                    sub: 'Currently expected to receive coverage'
                },
                {
                    label: 'Coverage Stats Entries',
                    value: `${Object.keys(data.coverage_stats || {}).length}`,
                    sub: 'Projects with artifact data'
                },
                {
                    label: 'Tracked Recommendations',
                    value: `${(data.recommendations || []).length}`,
                    sub: 'Priority-ranked projects'
                }
            ];

            document.getElementById('metricsGrid').innerHTML = metrics.map(metric => `
                <article class="metric-card">
                    <div class="metric-label">${metric.label}</div>
                    <div class="metric-value">${metric.value}</div>
                    <div class="metric-sub">${metric.sub}</div>
                </article>
            `).join('');
        }

        function renderRecommendations(data) {
            const list = document.getElementById('recommendationList');
            const recommendations = (data.recommendations || []).slice(0, 6);
            if (!recommendations.length) {
                list.innerHTML = '<li class="recommendation-item">No recommendations available.</li>';
                return;
            }

            list.innerHTML = recommendations.map(rec => {
                const priority = Number(rec.priority_score || 0).toFixed(2);
                return `
                    <li class="recommendation-item">
                        <strong>${rec.project_name}</strong> • Priority <span class="score-pill">${priority}</span><br>
                        <span class="muted">Missing: ${rec.missing_participants} participant(s) • Age: ${formatAge(Number(rec.project_age_days || 0))}</span>
                    </li>
                `;
            }).join('');
        }

        function renderAlerts(data) {
            const list = document.getElementById('alertsList');
            const wide = data.village_wide_coverage || {};
            const uncoveredByName = new Set(wide.uncovered_project_names || []);

            const alertCandidates = (data.recommendations || [])
                .filter(rec => uncoveredByName.has(rec.project_name))
                .sort((a, b) => Number(b.priority_score || 0) - Number(a.priority_score || 0));

            if (!alertCandidates.length) {
                list.innerHTML = '<li class="alert-item">No newly discovered projects are currently awaiting coverage.</li>';
                return;
            }

            list.innerHTML = alertCandidates.map(rec => {
                const missing = (rec.missing_participant_names || []).join(', ') || 'No participants listed';
                return `
                    <li class="alert-item">
                        <div class="alert-title">${rec.project_name}</div>
                        <div>Newly discovered and not yet covered.</div>
                        <div class="muted">Priority ${Number(rec.priority_score || 0).toFixed(2)} • ${formatAge(Number(rec.project_age_days || 0))} old • Missing: ${missing}</div>
                    </li>
                `;
            }).join('');
        }

        function getFilteredRows() {
            const text = state.searchText.trim().toLowerCase();
            const filtered = state.rows.filter(row => {
                const matchesText = !text || row.name.toLowerCase().includes(text);
                const matchesType = state.typeFilter === 'all' || row.type === state.typeFilter;
                return matchesText && matchesType;
            });

            filtered.sort((a, b) => {
                const key = state.sortKey;
                const dir = state.sortDir === 'asc' ? 1 : -1;
                if (key === 'name' || key === 'type') {
                    return a[key].localeCompare(b[key]) * dir;
                }
                return (a[key] - b[key]) * dir;
            });

            return filtered;
        }

        function renderTable() {
            const body = document.getElementById('projectTableBody');
            const rows = getFilteredRows();

            body.innerHTML = rows.map(row => `
                <tr>
                    <td>${row.name}</td>
                    <td>${row.type}</td>
                    <td><span class="coverage-pill">${row.coverage.toFixed(1)}%</span></td>
                    <td>${formatAge(row.ageDays)}</td>
                    <td><span class="score-pill">${row.priorityScore.toFixed(2)}</span></td>
                </tr>
            `).join('');

            document.getElementById('projectCount').textContent = `${rows.length} project(s) shown`;
        }

        function attachInteractions() {
            document.getElementById('projectSearch').addEventListener('input', (event) => {
                state.searchText = event.target.value;
                renderTable();
            });

            document.getElementById('projectTypeFilter').addEventListener('change', (event) => {
                state.typeFilter = event.target.value;
                renderTable();
            });

            document.querySelectorAll('th[data-sort-key]').forEach(th => {
                th.addEventListener('click', () => {
                    const nextKey = th.dataset.sortKey;
                    if (state.sortKey === nextKey) {
                        state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
                    } else {
                        state.sortKey = nextKey;
                        state.sortDir = (nextKey === 'name' || nextKey === 'type') ? 'asc' : 'desc';
                    }
                    renderTable();
                });
            });
        }

        function hydrateRows(data) {
            const recommendations = data.recommendations || [];
            state.rows = recommendations.map(rec => {
                const name = rec.project_name || rec.project_id || 'Unknown Project';
                return {
                    name,
                    type: classifyProjectType(rec.project_id, rec.project_name),
                    coverage: toCoverage(rec),
                    ageDays: Number(rec.project_age_days || 0),
                    priorityScore: Number(rec.priority_score || 0)
                };
            });

            const types = ['all', ...new Set(state.rows.map(r => r.type))];
            const typeFilter = document.getElementById('projectTypeFilter');
            typeFilter.innerHTML = types.map(type => {
                const label = type === 'all' ? 'All Types' : type;
                return `<option value="${type}">${label}</option>`;
            }).join('');
        }

        async function loadDashboardData() {
            try {
                const response = await fetch('dashboard_data.json', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                renderMetrics(data);
                hydrateRows(data);
                renderTable();
                renderRecommendations(data);
                renderAlerts(data);

                const updatedAt = data.updated_at ? new Date(data.updated_at) : new Date();
                document.getElementById('timestamp').textContent = updatedAt.toLocaleString();
            } catch (error) {
                console.error('Failed to load dashboard_data.json', error);
                document.getElementById('timestamp').textContent = 'Unavailable (load failed)';
                document.getElementById('metricsGrid').innerHTML = '<article class="metric-card"><div class="metric-label">Status</div><div class="metric-value" style="font-size:1.1rem;color:var(--danger)">Data load failed</div><div class="metric-sub">Could not fetch dashboard_data.json</div></article>';
            }
        }

        attachInteractions();
        loadDashboardData();
        setInterval(loadDashboardData, 5 * 60 * 1000);
    </script>
</body>
</html>
